# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgba(564a38ee) rgba(c8a03cee) rgba(564a38ee) 45deg
$inactiveBorderColor = rgba(564a3855)
$activeShadowColor = rgba(00000099)
$inactiveShadowColor = rgba(0000004d)

animations {
    bezier = regnalEase, 0.4, 0, 0.2, 1

    animation = borderangle, 1, 20, regnalEase, once
    animation = windows, 1, 4, regnalEase, slide
    animation = windowsIn, 1, 4, regnalEase, slide
    animation = windowsOut, 1, 3, regnalEase, slide
    animation = fade, 1, 4, regnalEase
    animation = workspaces, 1, 5, regnalEase, slide
}

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 2
    gaps_in = 5
    gaps_out = 10
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

decoration {
    rounding = 0
    dim_inactive = true
    dim_strength = 0.15
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 5
        passes = 3
        noise = 0.08
        contrast = 1.18
        brightness = 0.86
        vibrancy = 0.22
        vibrancy_darkness = 0.83
        ignore_opacity = true
        new_optimizations = true
        xray = false
        special = false
        popups = true
        popups_ignorealpha = 0.65
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        offset = 2 4
        ignore_window = true
        color = $activeShadowColor
        color_inactive = $inactiveShadowColor
    }
}

